appId: com.jk3da.pdfstudio
productName: JK3DA PDF Studio
copyright: Private, offline use only

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - package.json

# Native Sidecars (qpdf, ghostscript, tesseract, ...) liegen in resources/bin
# und werden unverändert ins Paket kopiert. Aktuell leer (Phase 0).
extraResources:
  - from: resources/bin
    to: bin
    filter:
      - '**/*'

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  # "Öffnen mit"-Eintrag für PDFs (Standard-App bleibt Nutzer-Entscheidung).
  fileAssociations:
    - ext: pdf
      name: PDF-Dokument
      description: PDF-Dokument
      role: Editor

portable:
  artifactName: ${productName}-${version}-Portable.${ext}

nsis:
  artifactName: ${productName}-${version}-Setup.${ext}
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
